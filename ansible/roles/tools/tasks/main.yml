- name: Detect system architecture
  ansible.builtin.set_fact:
    tools_arch: "{{ 'arm64' if ansible_facts['architecture'] == 'aarch64' else 'amd64' }}"

- name: Install NVM  # noqa: command-instead-of-module risky-shell-pipe
  ansible.builtin.shell:
    cmd: curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.7/install.sh | bash
    creates: "{{ ansible_facts['env']['HOME'] }}/.nvm/nvm.sh"
  changed_when: true

- name: Check if Node is installed - {{ tools_node_version }}
  ansible.builtin.find:
    paths: "{{ ansible_facts['env']['HOME'] }}/.nvm/versions/node"
    patterns: "v{{ tools_node_version }}*"
    file_type: directory
  register: tools_node_dirs

- name: Install Node via NVM - {{ tools_node_version }}
  ansible.builtin.shell:
    cmd: |
      source {{ ansible_facts['env']['HOME'] }}/.nvm/nvm.sh
      nvm install {{ tools_node_version }}
      nvm alias default {{ tools_node_version }}
    executable: /bin/bash
  changed_when: true
  when: tools_node_dirs.matched == 0

- name: Install SDKMAN  # noqa: command-instead-of-module risky-shell-pipe
  ansible.builtin.shell:
    cmd: curl -s "https://get.sdkman.io" | bash
    creates: "{{ ansible_facts['env']['HOME'] }}/.sdkman/bin/sdkman-init.sh"
  changed_when: true

- name: Check if Java is installed - {{ tools_java_version }}
  ansible.builtin.stat:
    path: "{{ ansible_facts['env']['HOME'] }}/.sdkman/candidates/java/{{ tools_java_version }}"
  register: tools_java_dir

- name: Install Java via SDKMAN - {{ tools_java_version }}
  ansible.builtin.shell:
    cmd: |
      source {{ ansible_facts['env']['HOME'] }}/.sdkman/bin/sdkman-init.sh
      sdk install java {{ tools_java_version }}
    executable: /bin/bash
  changed_when: true
  when: not tools_java_dir.stat.exists

- name: Check if Go is installed
  ansible.builtin.stat:
    path: /usr/local/go/bin/go
  register: tools_go_binary

- name: Download Go {{ tools_go_version }}
  ansible.builtin.get_url:
    url: "https://go.dev/dl/go{{ tools_go_version }}.linux-{{ tools_arch }}.tar.gz"
    dest: /tmp/go.tar.gz
    mode: '0644'
  become: true
  when: not tools_go_binary.stat.exists

- name: Extract Go {{ tools_go_version }}
  ansible.builtin.unarchive:
    src: /tmp/go.tar.gz
    dest: /usr/local
    remote_src: true
  become: true
  when: not tools_go_binary.stat.exists

- name: Install TPM  # noqa: latest[git]
  ansible.builtin.git:
    repo: https://github.com/tmux-plugins/tpm
    dest: "{{ ansible_facts['env']['HOME'] }}/.tmux/plugins/tpm"
    update: false

- name: Install TPM plugins
  ansible.builtin.command:
    cmd: "{{ ansible_facts['env']['HOME'] }}/.tmux/plugins/tpm/bin/install_plugins"
  changed_when: true

- name: Check if Docker is installed
  ansible.builtin.stat:
    path: /usr/bin/docker
  register: tools_docker_binary

- name: Install Docker  # noqa: command-instead-of-module risky-shell-pipe
  ansible.builtin.shell:
    cmd: curl -fsSL https://get.docker.com | sh
  become: true
  changed_when: true
  when: not tools_docker_binary.stat.exists

- name: Add user to docker group
  ansible.builtin.user:
    name: "{{ ansible_facts['env']['USER'] }}"
    groups: docker
    append: true
  become: true

- name: Check if kubectl is installed
  ansible.builtin.stat:
    path: /usr/local/bin/kubectl
  register: tools_kubectl_binary

- name: Get kubectl stable version
  ansible.builtin.uri:
    url: https://dl.k8s.io/release/stable.txt
    return_content: true
  register: tools_kubectl_stable_version
  when: not tools_kubectl_binary.stat.exists

- name: Install kubectl
  ansible.builtin.get_url:
    url: "https://dl.k8s.io/release/{{ tools_kubectl_stable_version.content | trim }}/bin/linux/{{ tools_arch }}/kubectl"
    dest: /usr/local/bin/kubectl
    mode: '0755'
  become: true
  when: not tools_kubectl_binary.stat.exists

- name: Check if Helm is installed
  ansible.builtin.stat:
    path: /usr/local/bin/helm
  register: tools_helm_binary

- name: Install Helm  # noqa: command-instead-of-module risky-shell-pipe
  ansible.builtin.shell:
    cmd: curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
  become: true
  changed_when: true
  when: not tools_helm_binary.stat.exists

- name: Check if k9s is installed
  ansible.builtin.stat:
    path: /usr/local/bin/k9s
  register: tools_k9s_binary

- name: Get k9s latest release info
  ansible.builtin.uri:
    url: https://api.github.com/repos/derailed/k9s/releases/latest
  register: tools_k9s_release
  when: not tools_k9s_binary.stat.exists

- name: Set k9s download URL
  ansible.builtin.set_fact:
    tools_k9s_url: >-
      {{ tools_k9s_release.json.assets
         | selectattr('name', 'equalto', 'k9s_Linux_' + tools_arch + '.tar.gz')
         | map(attribute='browser_download_url')
         | first }}
  when: not tools_k9s_binary.stat.exists

- name: Download k9s
  ansible.builtin.get_url:
    url: "{{ tools_k9s_url }}"
    dest: /tmp/k9s.tar.gz
    mode: '0644'
  when: not tools_k9s_binary.stat.exists

- name: Extract k9s
  ansible.builtin.unarchive:
    src: /tmp/k9s.tar.gz
    dest: /usr/local/bin
    extra_opts:
      - k9s
  become: true
  when: not tools_k9s_binary.stat.exists

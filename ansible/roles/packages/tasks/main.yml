- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  become: true

- name: Install packages
  ansible.builtin.apt:
    name:
      - git
      - stow
      - vim
      - tmux
      - curl
      - wget
      - xclip
      - wl-clipboard
      - fzf
      - build-essential
      - unzip
      - zip
      - podman
      - jq
      - htop
      - rsync
      - ccache
      - cmake
      - gnupg
      - openssh-client
    state: present
  become: true

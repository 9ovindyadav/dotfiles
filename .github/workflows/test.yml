name: Test Dotfiles

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bash syntax check
        run: bash -n .bashrc

      - name: Shellcheck
        run: |
          sudo apt install -y shellcheck
          shellcheck .bashrc bootstrap.sh

      - name: Install ansible and ansible-lint
        run: pip install ansible ansible-lint

      - name: Ansible syntax check
        run: ansible-playbook --syntax-check ansible/playbook.yml

      - name: Ansible lint
        run: ansible-lint ansible/playbook.yml

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy repo to ~/dotfiles
        run: cp -r $GITHUB_WORKSPACE ~/dotfiles

      - name: Install Ansible and Stow
        run: sudo apt update && sudo apt install -y ansible stow

      - name: Remove default conflicting dotfiles
        run: rm -f ~/.bashrc ~/.vimrc ~/.tmux.conf ~/.gitconfig

      - name: Run playbook (packages + dotfiles only)
        run: |
          cd ~/dotfiles
          ansible-playbook ansible/playbook.yml --skip-tags tools

      - name: Verify symlinks
        run: |
          test -L ~/.bashrc    && echo "ok .bashrc"
          test -L ~/.vimrc     && echo "ok .vimrc"
          test -L ~/.tmux.conf && echo "ok .tmux.conf"
          test -L ~/.gitconfig && echo "ok .gitconfig"

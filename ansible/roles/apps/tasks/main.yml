- name: Detect system architecture
  ansible.builtin.set_fact:
    apps_arch: "{{ 'arm64' if ansible_facts['architecture'] == 'aarch64' else 'amd64' }}"

- name: Install VLC
  ansible.builtin.apt:
    name: vlc
    state: present
  become: true

- name: Check if Brave is installed
  ansible.builtin.stat:
    path: /usr/bin/brave-browser
  register: apps_brave_binary

- name: Add Brave apt key
  ansible.builtin.get_url:
    url: https://brave-keyring.apt.brave.com/brave-browser-archive-keyring.gpg
    dest: /usr/share/keyrings/brave-browser-archive-keyring.gpg
    mode: '0644'
  become: true
  when: not apps_brave_binary.stat.exists

- name: Add Brave apt repo
  ansible.builtin.apt_repository:
    repo: "deb [arch={{ apps_arch }} signed-by=/usr/share/keyrings/brave-browser-archive-keyring.gpg] https://brave-keyring.apt.brave.com/ stable main"
    state: present
  become: true
  when: not apps_brave_binary.stat.exists

- name: Install Brave
  ansible.builtin.apt:
    name: brave-browser
    update_cache: true
  become: true
  when: not apps_brave_binary.stat.exists

- name: Check if Bitwarden is installed
  ansible.builtin.stat:
    path: /usr/bin/bitwarden
  register: apps_bitwarden_binary

- name: Get Bitwarden latest release info
  ansible.builtin.uri:
    url: https://api.github.com/repos/bitwarden/clients/releases/latest
  register: apps_bitwarden_release
  when: not apps_bitwarden_binary.stat.exists

- name: Download Bitwarden deb
  ansible.builtin.get_url:
    url: >-
      {{ apps_bitwarden_release.json.assets
         | selectattr('name', 'match', 'Bitwarden-.*-' + apps_arch + '\.deb')
         | map(attribute='browser_download_url')
         | first }}
    dest: /tmp/bitwarden.deb
    mode: '0644'
  when: not apps_bitwarden_binary.stat.exists

- name: Install Bitwarden deb
  ansible.builtin.apt:
    deb: /tmp/bitwarden.deb
  become: true
  when: not apps_bitwarden_binary.stat.exists

- name: Check if Zed is installed
  ansible.builtin.stat:
    path: "{{ ansible_facts['env']['HOME'] }}/.local/bin/zed"
  register: apps_zed_binary

- name: Install Zed  # noqa: command-instead-of-module risky-shell-pipe
  ansible.builtin.shell:
    cmd: curl -f https://zed.dev/install.sh | sh
  changed_when: true
  when: not apps_zed_binary.stat.exists

- name: Check if Sublime Merge is installed
  ansible.builtin.stat:
    path: /usr/bin/smerge
  register: apps_smerge_binary

- name: Add Sublime Text apt key
  ansible.builtin.get_url:
    url: https://download.sublimetext.com/sublimehq-pub.gpg
    dest: /usr/share/keyrings/sublimehq-pub.gpg
    mode: '0644'
  become: true
  when: not apps_smerge_binary.stat.exists

- name: Add Sublime Text apt repo
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/sublimehq-pub.gpg] https://download.sublimetext.com/ apt/stable/"
    state: present
  become: true
  when: not apps_smerge_binary.stat.exists

- name: Install Sublime Merge
  ansible.builtin.apt:
    name: sublime-merge
    update_cache: true
  become: true
  when: not apps_smerge_binary.stat.exists

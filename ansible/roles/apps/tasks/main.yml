- name: Detect system architecture
  ansible.builtin.set_fact:
    apps_arch: "{{ 'arm64' if ansible_facts['architecture'] == 'aarch64' else 'amd64' }}"

- name: Install VLC
  ansible.builtin.apt:
    name: vlc
    state: present
  become: true

- name: Check if Brave is installed
  ansible.builtin.stat:
    path: /usr/bin/brave-browser
  register: apps_brave_binary

- name: Install Brave  # noqa: command-instead-of-module risky-shell-pipe
  ansible.builtin.shell:
    cmd: curl -fsS https://dl.brave.com/install.sh | sh
    creates: /usr/bin/brave-browser
  become: true
  changed_when: true
  retries: 3
  delay: 10
  when: not apps_brave_binary.stat.exists

- name: Check if Bitwarden is installed
  ansible.builtin.stat:
    path: /usr/bin/bitwarden
  register: apps_bitwarden_binary

- name: Download Bitwarden deb
  ansible.builtin.get_url:
    url: https://bitwarden.com/download/?app=desktop&platform=linux&variant=deb
    dest: /tmp/bitwarden.deb
    mode: '0644'
  retries: 3
  delay: 10
  when: not apps_bitwarden_binary.stat.exists

- name: Install Bitwarden deb
  ansible.builtin.apt:
    deb: /tmp/bitwarden.deb
  become: true
  when: not apps_bitwarden_binary.stat.exists

- name: Check if Zed is installed
  ansible.builtin.stat:
    path: "{{ ansible_facts['env']['HOME'] }}/.local/bin/zed"
  register: apps_zed_binary

- name: Install Zed  # noqa: command-instead-of-module risky-shell-pipe
  ansible.builtin.shell:
    cmd: curl -f https://zed.dev/install.sh | sh
  changed_when: true
  retries: 3
  delay: 10
  when: not apps_zed_binary.stat.exists

- name: Check if Sublime Merge is installed
  ansible.builtin.stat:
    path: /usr/bin/smerge
  register: apps_smerge_binary

- name: Install Sublime Merge  # noqa: command-instead-of-module risky-shell-pipe
  ansible.builtin.shell:
    cmd: |
      wget -qO - https://download.sublimetext.com/sublimehq-pub.gpg \
        | gpg --dearmor \
        | tee /etc/apt/trusted.gpg.d/sublimehq-archive.gpg > /dev/null
      echo "deb https://download.sublimetext.com/ apt/stable/" \
        | tee /etc/apt/sources.list.d/sublime-text.list
      apt-get install -y apt-transport-https
      apt-get update
      apt-get install -y sublime-merge
    executable: /bin/bash
    creates: /usr/bin/smerge
  become: true
  changed_when: true
  retries: 3
  delay: 10
  when: not apps_smerge_binary.stat.exists

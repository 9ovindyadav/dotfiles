unbind C-b
unbind C-a

set -g prefix C-a
bind C-a send-prefix

bind r source-file ~/.tmux.conf \; display "Reloaded!"

set -g mouse on
set -sg escape-time 0

set-option -g history-limit 50000

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

set-option -g default-command "${SHELL} -l"
set-option -sa terminal-overrides ".xterm*:Tc"

bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

setw -g mode-keys vi

# Copy mode: v to select, C (Shift+c) to copy, mouse drag auto-copies
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C send-keys -X copy-pipe-and-cancel "wl-copy 2>/dev/null || xclip -selection clipboard -in"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "wl-copy 2>/dev/null || xclip -selection clipboard -in"

# Slow scroll: 3 lines per tick (default is 5)
bind -T copy-mode-vi WheelUpPane   select-pane \; send-keys -X -N 3 scroll-up
bind -T copy-mode-vi WheelDownPane select-pane \; send-keys -X -N 3 scroll-down

# Scroll up enters copy mode and scrolls 3 lines; scroll down exits when not in mode
bind -n WheelUpPane if-shell -F "#{pane_in_mode}" \
  "send-keys -X -N 3 scroll-up" \
  "copy-mode -e; send-keys -X -N 3 scroll-up"
bind -n WheelDownPane if-shell -F "#{pane_in_mode}" \
  "send-keys -X -N 3 scroll-down" \
  "send-keys -M"

# Shift+PgUp to enter copy mode and scroll up (like xterm/gnome-terminal)
bind -n S-PgUp copy-mode -u

# In copy mode: PgUp/PgDn, Shift+arrows to extend selection while scrolling
bind-key -T copy-mode-vi S-Up   send-keys -X select-up
bind-key -T copy-mode-vi S-Down send-keys -X select-down

# Paste with prefix+V (Ctrl+a then Shift+v)
bind V run-shell "wl-paste 2>/dev/null || xclip -selection clipboard -out" \; paste-buffer

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'dreamsofcode-io/catppuccin-tmux'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-cpu'

set -g @continuum-restore 'on'

run '~/.tmux/plugins/tpm/tpm'
